@for (item of items(); track item.id) {
	@if (item.type === 'separator') {
		<hub-nav-separator />
	} @else {
		<div
			#itemWrapper
			class="hub-nav-item-wrapper"
			[class.hub-nav-item-wrapper--has-dropdown]="hasChildren(item)"
			(mouseenter)="onItemMouseEnter(item)"
			(mouseleave)="onItemMouseLeave(item)"
		>
			<hub-nav-item
				[item]="item"
				[depth]="depth()"
				[isActive]="isItemActive(item)"
				[isExpanded]="isExpanded(item)"
				[itemTemplate]="itemTemplate()"
				[forceAccordionMode]="forceAccordionMode()"
				(clicked)="onItemClick($event)"
				(toggleDropdown)="onDropdownToggle($event)"
			/>

			<ng-template #overlayDropdownTemplate>
				<div class="hub-nav-dropdown" role="menu">
					<hub-nav-item-list
						[items]="item.children ?? []"
						[depth]="depth() + 1"
						[itemTemplate]="itemTemplate()"
						[forceAccordionMode]="forceAccordionMode()"
						[dropdownRenderMode]="dropdownRenderMode()"
						[overlayOwnerClass]="overlayOwnerClass()"
						[overlayOrientationClass]="overlayOrientationClass()"
						(itemClick)="onItemClick($event)"
						(dropdownToggle)="dropdownToggle.emit($event)"
						(panelOpen)="panelOpen.emit($event)"
					/>
				</div>
			</ng-template>

			<!-- Children: accordion (inline), flyout/dropdown (positioned), or panel (external) -->
			@if (hasChildren(item) && isExpanded(item) && getItemExpandMode(item) !== 'panel' && !shouldRenderDropdownInOverlay(item)) {
				@if (getItemExpandMode(item) === 'accordion') {
					<!-- Accordion: children expand inline with indentation -->
					<div
						class="hub-nav-accordion"
						role="group"
						[style.padding-left]="'var(--hub-nav-accordion-indent, 1rem)'"
					>
						<hub-nav-item-list
							[items]="item.children!"
							[depth]="depth() + 1"
							[itemTemplate]="itemTemplate()"
							[forceAccordionMode]="forceAccordionMode()"
							[dropdownRenderMode]="dropdownRenderMode()"
							[overlayOwnerClass]="overlayOwnerClass()"
							[overlayOrientationClass]="overlayOrientationClass()"
							(itemClick)="onItemClick($event)"
							(dropdownToggle)="dropdownToggle.emit($event)"
							(panelOpen)="panelOpen.emit($event)"
						/>
					</div>
				} @else {
					<!-- Flyout / Dropdown: positioned panel -->
					<div class="hub-nav-dropdown" role="menu">
						<hub-nav-item-list
							[items]="item.children!"
							[depth]="depth() + 1"
							[itemTemplate]="itemTemplate()"
							[forceAccordionMode]="forceAccordionMode()"
							[dropdownRenderMode]="dropdownRenderMode()"
							[overlayOwnerClass]="overlayOwnerClass()"
							[overlayOrientationClass]="overlayOrientationClass()"
							(itemClick)="onItemClick($event)"
							(dropdownToggle)="dropdownToggle.emit($event)"
							(panelOpen)="panelOpen.emit($event)"
						/>
					</div>
				}
			}
		</div>
	}
}
